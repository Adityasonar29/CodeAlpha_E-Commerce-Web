{% extends 'store/base.html' %}

{% block title %}Edit User | EasyShop{% endblock %}

{% block content %}
<div class="mx-auto max-w-2xl rounded-[2rem] border border-slate-200 bg-white p-8 shadow-lg">
    <div>
        <p class="text-sm uppercase tracking-[0.35em] text-slate-500">Update account</p>
        <h1 class="mt-3 text-3xl font-bold text-slate-900">Edit {{ selected_user.username }}</h1>
        <p class="mt-3 text-sm leading-7 text-slate-600">You can update the user's name and email address here.</p>
    </div>

    <form method="post" class="mt-8 space-y-5">
        {% csrf_token %}
        <div class="grid gap-4 sm:grid-cols-2">
            <div>
                <label class="text-sm font-semibold text-slate-700" for="first_name">First name</label>
                <input id="first_name" name="first_name" value="{{ selected_user.first_name }}" class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-indigo-400" />
            </div>
            <div>
                <label class="text-sm font-semibold text-slate-700" for="last_name">Last name</label>
                <input id="last_name" name="last_name" value="{{ selected_user.last_name }}" class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-indigo-400" />
            </div>
        </div>
        <div>
            <label class="text-sm font-semibold text-slate-700" for="email">Email</label>
            <input id="email" name="email" type="email" value="{{ selected_user.email }}" required class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-indigo-400" />
        </div>
        <div class="flex flex-wrap gap-3">
            <button type="submit" class="rounded-full bg-slate-950 px-5 py-3 text-sm font-semibold text-white transition hover:bg-slate-800">Save changes</button>
            <a href="{% url 'admin_user_detail' selected_user.id %}" class="rounded-full border border-slate-200 bg-white px-5 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-100">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
