{% extends 'store/base.html' %}

{% block title %}Order Success | EasyShop{% endblock %}

{% block content %}
<div class="mx-auto w-full max-w-xl rounded-[2rem] border border-slate-200 bg-white px-5 py-8 shadow-2xl shadow-slate-900/10 sm:px-10 sm:py-10">
    <div class="flex h-20 w-20 items-center justify-center rounded-full bg-brand-100 text-4xl text-brand-700 shadow-lg shadow-brand-200/40 mx-auto">
        ✓
    </div>
    <h1 class="mt-6 text-3xl font-bold text-slate-900 text-center">Order confirmed</h1>
    <p class="mt-4 text-center text-slate-600">Thanks for your purchase. Your order reference is <span class="font-semibold text-slate-900">#{{ order.id }}</span> with a total of <span class="font-semibold text-brand-700">Rs. {{ order.total_price }}</span>.</p>
    <div class="mt-8 flex w-full flex-col items-center justify-center gap-4 text-center sm:flex-row sm:justify-center sm:gap-6">
        <a href="{% url 'product_list' %}" class="w-full rounded-full bg-slate-900 px-6 py-3 text-sm font-semibold text-white transition hover:bg-slate-800 sm:w-auto">Return home</a>
        <a href="{% url 'user_dashboard' %}" class="w-full rounded-full bg-slate-900 px-6 py-3 text-sm font-semibold text-white transition hover:bg-slate-800 sm:w-auto">View dashboard</a>
    </div>
</div>
{% endblock %}
